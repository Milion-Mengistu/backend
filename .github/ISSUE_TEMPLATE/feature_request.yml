name: Feature request
description: Propose a backend feature or API capability
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What user or system outcome should this feature produce?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
      description: Describe the backend/API/data/AI work expected.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the conditions that make this complete.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Note external systems, schema changes, or frontend/hardware dependencies.
  - type: textarea
    id: testing
    attributes:
      label: Test plan
      description: How should this be validated?
