services:
  - type: web
    name: fuel-aware-backend
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_DB_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
